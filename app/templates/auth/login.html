{% extends 'base.html' %}

{% block login_content %}
<div class="row justify-content-center">
    <div class="col-md-4 col-sm-8 col-10">
        <div class="card shadow" style="border-radius: 12px; border: none; padding: 20px;">
            <div class="card-body text-center p-4">
                <h3 style="color: var(--macuin-dark-blue); font-weight: 800; letter-spacing: 1px; margin-bottom: 5px;">
                    MACUIN</h3>
                <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 30px;">
                    <i class="bi bi-circle text-primary" style="font-size: 0.5rem; vertical-align: middle;"></i> Portal
                    Administrativo
                </p>

                <form method="POST" action="{{ url_for('auth.login') }}" class="text-start">
                    <div class="mb-3">
                        <label for="email" class="form-label text-muted"
                            style="font-size: 0.85rem; font-weight: 600;">ID de Empleado</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white" style="border-right: none; color: #aaa;"><i
                                    class="bi bi-person"></i></span>
                            <input type="email" class="form-control" id="email" name="email" required
                                placeholder="Ingrese su ID o correo corporativo"
                                style="border-left: none; font-size: 0.9rem; padding: 10px;">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted"
                            style="font-size: 0.85rem; font-weight: 600;">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white" style="border-right: none; color: #aaa;"><i
                                    class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required
                                placeholder="Ingrese su contraseña"
                                style="border-left: none; font-size: 0.9rem; padding: 10px;">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 py-2"
                        style="font-weight: 600; border-radius: 6px;">Iniciar Sesión</button>
                </form>

                <div class="mt-4 pt-3" style="border-top: 1px solid #eee;">
                    <small class="text-muted" style="font-size: 0.75rem;">
                        <i class="bi bi-lock-fill"></i> Acceso restringido a personal autorizado.
                    </small>
                </div>
            </div>
        </div>
        <div class="text-center mt-4">
            <small class="text-muted" style="font-size: 0.7rem;">Sistema de Gestión de Inventarios v1.0 - © 2026
                MACUIN</small>
        </div>
    </div>
</div>
{% endblock %}
