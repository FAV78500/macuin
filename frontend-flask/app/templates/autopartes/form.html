{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm mx-auto"
    style="border: 1px solid var(--macuin-border); border-radius: 8px; max-width: 900px; margin-top: 20px;">
    <div class="card-body p-5">

        <h5
            style="color: var(--macuin-dark-blue); font-weight: 700; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
            Alta/Edición de Autoparte
        </h5>

        <form method="POST"
            action="{{ url_for('autopartes.editar', id=parte.get('id')) if parte.get('id') else url_for('autopartes.nuevo') }}">
            <div class="row">
                <!-- Left Column -->
                <div class="col-md-6 pe-md-4">
                    <div class="mb-3">
                        <label for="nombre" class="form-label text-muted"
                            style="font-size: 0.85rem; font-weight: 600;">Nombre de la Parte</label>
                        <input type="text" class="form-control" id="nombre" name="nombre"
                            value="{{ parte.get('nombre', '') }}" required placeholder="Bujía Iridio NGK"
                            style="font-size: 0.9rem; padding: 10px;">
                    </div>

                    <div class="mb-3">
                        <label for="numero_parte" class="form-label text-muted"
                            style="font-size: 0.85rem; font-weight: 600;">Número de Parte</label>
                        <input type="text" class="form-control" id="numero_parte" name="numero_parte"
                            value="{{ parte.get('numero_parte', '') }}" placeholder="NGK-IR-7450"
                            style="font-size: 0.9rem; padding: 10px;">
                    </div>

                    <div class="mb-3">
                        <label for="marca" class="form-label text-muted"
                            style="font-size: 0.85rem; font-weight: 600;">Marca</label>
                        <input type="text" class="form-control" id="marca" name="marca"
                            value="{{ parte.get('marca', '') }}" placeholder="NGK, Bosch, Brembo..."
                            style="font-size: 0.9rem; padding: 10px;">
                    </div>

                    <div class="mb-3">
                        <label for="categoria_id" class="form-label text-muted"
                            style="font-size: 0.85rem; font-weight: 600;">Categoría</label>
                        <select class="form-select" id="categoria_id" name="categoria_id"
                            style="font-size: 0.9rem; padding: 10px;" required>
                            <option value="" disabled {% if not parte.get('categoria_id') %}selected{% endif %}>
                                Seleccionar categoría...</option>
                            {% for cat in categorias %}
                            <option value="{{ cat.get('id') }}"
                                {% if parte.get('categoria_id') == cat.get('id') or parte.get('categoria', {}).get('id') == cat.get('id') %}selected{% endif %}>
                                {{ cat.get('nombre') }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="col-md-6 ps-md-4">
                    <div class="mb-3">
                        <label for="descripcion" class="form-label text-muted"
                            style="font-size: 0.85rem; font-weight: 600;">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="4"
                            placeholder="Bujía de iridio de alto rendimiento..."
                            style="font-size: 0.9rem; padding: 10px;">{{ parte.get('descripcion', '') }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted" style="font-size: 0.85rem; font-weight: 600;">Stock Inicial
                            / Cantidad</label>
                        <input type="number" class="form-control" placeholder="150"
                            style="font-size: 0.9rem; padding: 10px;">
                    </div>

                    <div class="mb-3">
                        <label for="precio" class="form-label text-muted"
                            style="font-size: 0.85rem; font-weight: 600;">Precio Unitario ($)</label>
                        <input type="number" step="0.01" class="form-control" id="precio" name="precio"
                            value="{{ parte.get('precio', '') }}" required placeholder="450.00"
                            style="font-size: 0.9rem; padding: 10px;">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted d-block"
                            style="font-size: 0.85rem; font-weight: 600;">Activo del Producto</label>
                        <div class="form-check form-switch" style="font-size: 1.1rem;">
                            <input class="form-check-input" type="checkbox" id="activo" name="activo" {% if
                                parte.get('activo', True) %}checked{% endif %}
                                style="background-color: #10B981; border-color: #10B981;">
                            <label class="form-check-label ms-2" for="activo"
                                style="font-size: 0.9rem; font-weight: 600; color: #10B981;">Activo</label>
                        </div>
                    </div>

                    <div class="mb-4 mt-4">
                        <label class="form-label text-muted d-block"
                            style="font-size: 0.85rem; font-weight: 600;">Imagen del Producto</label>
                        <button type="button" class="btn btn-danger btn-sm px-3"
                            style="font-weight: 600; border-radius: 6px;">
                            <i class="bi bi-upload"></i> Subir Imagen
                        </button>
                        <div class="mt-3 border rounded d-flex justify-content-center align-items-center"
                            style="width: 80px; height: 80px; background-color: #f9f9f9;">
                            <i class="bi bi-image text-muted" style="font-size: 1.5rem;"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="mt-4 pt-3 border-top d-flex gap-3">
                <button type="submit" class="btn btn-primary px-4 py-2"
                    style="font-weight: 600; border-radius: 6px; background-color: var(--macuin-dark-blue);">Guardar
                    Cambios</button>
                <a href="{{ url_for('autopartes.index') }}" class="btn btn-outline-secondary px-4 py-2"
                    style="font-weight: 600; border-radius: 6px;">Cancelar</a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
