version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# REDES
#   red_interna  → db + api           (los frontends NUNCA entran aquí)
#   red_frontends → api + flask + laravel
# ─────────────────────────────────────────────────────────────────────────────
networks:
  red_interna:
    driver: bridge
  red_frontends:
    driver: bridge

volumes:
  postgres_data:

services:

  # ── BASE DE DATOS ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    networks:
      - red_interna
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API CENTRAL (FastAPI) ──────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    networks:
      - red_interna     # habla con la BD
      - red_frontends   # recibe peticiones de los frontends
    ports:
      - "8000:8000"     # acceso desde el host (útil en desarrollo)
    environment:
      DATABASE_URL:                postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY:                  ${JWT_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── CLIENTE INTERNO (Flask) ────────────────────────────────────────────────
  web-interno:
    build:
      context: ./frontend-flask
      dockerfile: Dockerfile
    networks:
      - red_frontends   # solo habla con la API, nunca con la BD
    ports:
      - "5000:5000"
    environment:
      API_BASE_URL: http://api:8000/api/v1
      SECRET_KEY:   ${FLASK_SECRET_KEY}
      FLASK_DEBUG:  ${FLASK_DEBUG:-0}
    depends_on:
      - api
    restart: unless-stopped

  # ── CLIENTE EXTERNO (Laravel) ──────────────────────────────────────────────
  web-externo:
    build:
      context: ./frontend-laravel
      dockerfile: Dockerfile
    networks:
      - red_frontends   # solo habla con la API, nunca con la BD
    ports:
      - "8080:8000"
    environment:
      API_BASE_URL: http://api:8000/api/v1
    depends_on:
      - api
    restart: unless-stopped